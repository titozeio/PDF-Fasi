name: Latest Release

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: latest-release
  cancel-in-progress: true

jobs:
  build-release:
    name: Build latest release payload
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Prepare release payload
        run: |
          rm -rf release-package pdf-fasi-latest-release.zip
          mkdir -p release-package
          cp -R src release-package/
          cp -R docs release-package/
          cp -R specs release-package/
          cp README.md release-package/
          cp package.json release-package/
          cp package-lock.json release-package/
          zip -r pdf-fasi-latest-release.zip release-package

      - name: Prepare Windows installable package
        run: |
          rm -rf windows-installable pdf-fasi-windows-installable.zip
          mkdir -p windows-installable
          cp -R release-package/. windows-installable/
          cp -R release-package windows-installable/
          zip -r pdf-fasi-windows-installable.zip windows-installable

      - name: Upload preview artifact
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: latest-release-preview
          path: pdf-fasi-latest-release.zip

      - name: Upload installable preview artifact
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: windows-installable-preview
          path: pdf-fasi-windows-installable.zip

      - name: Publish latest release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: latest-release
          body: Automatically refreshed from the latest `main` build.
          files: |
            pdf-fasi-latest-release.zip
            pdf-fasi-windows-installable.zip
          make_latest: true
          overwrite_files: true
