name: Latest Release

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: latest-release
  cancel-in-progress: true

jobs:
  build-release:
    name: Build latest release payload
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Prepare release payload
        run: |
          rm -rf release-package pdf-fasi-latest-release.zip
          mkdir -p release-package
          cp -R src release-package/
          cp -R docs release-package/
          cp -R specs release-package/
          cp README.md release-package/
          cp package.json release-package/
          cp package-lock.json release-package/
          zip -r pdf-fasi-latest-release.zip release-package

      - name: Prepare Windows installable package
        run: |
          rm -rf windows-installable pdf-fasi-windows-installable.zip
          mkdir -p windows-installable
          cp -R release-package/. windows-installable/
          cp -R release-package windows-installable/
          zip -r pdf-fasi-windows-installable.zip windows-installable

      - name: Upload preview artifact
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v7
        with:
          name: latest-release-preview
          path: pdf-fasi-latest-release.zip

      - name: Upload installable preview artifact
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v7
        with:
          name: windows-installable-preview
          path: pdf-fasi-windows-installable.zip

      - name: Publish latest release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: latest-release
          body: Automatically refreshed from the latest `main` build.
          files: |
            pdf-fasi-latest-release.zip
            pdf-fasi-windows-installable.zip
          make_latest: true
          overwrite_files: true

      - name: Create routine tag
        if: github.event_name == 'push'
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          LATEST_TAG=$(git tag --list 'v*' --sort=-v:refname | head -n 1)

          CURRENT_MAJOR=${CURRENT_VERSION%%.*}
          if [ -n "$LATEST_TAG" ]; then
            LATEST_VERSION=${LATEST_TAG#v}
            LATEST_MAJOR=${LATEST_VERSION%%.*}
            if [ "$CURRENT_MAJOR" -gt "$LATEST_MAJOR" ]; then
              echo "Manual major release detected; skipping automatic tag."
              exit 0
            fi
            BASE_VERSION=$LATEST_VERSION
          else
            BASE_VERSION=$CURRENT_VERSION
          fi

          BASE_MAJOR=$(printf '%s' "$BASE_VERSION" | cut -d. -f1)
          BASE_MINOR=$(printf '%s' "$BASE_VERSION" | cut -d. -f2)
          NEXT_VERSION="${BASE_MAJOR}.$((BASE_MINOR + 1)).0"
          NEXT_TAG="v${NEXT_VERSION}"

          if git rev-parse "$NEXT_TAG" >/dev/null 2>&1; then
            echo "Tag $NEXT_TAG already exists."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$NEXT_TAG"
          git push origin "$NEXT_TAG"
