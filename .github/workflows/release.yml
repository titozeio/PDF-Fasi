name: Latest Release

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: latest-release
  cancel-in-progress: true

jobs:
  build:
    name: Build release artifacts
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            build_script: dist:win
            artifact_name: windows-portable-preview
            artifact_path: dist/*.exe
          - os: macos-latest
            build_script: dist:mac
            artifact_name: mac-dmg-preview
            artifact_path: dist/*.dmg

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        shell: bash
        run: npm install

      - name: Run tests
        shell: bash
        run: npm test

      - name: Build app artifact
        shell: bash
        run: npm run ${{ matrix.build_script }}

      - name: Upload preview artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}

  publish:
    name: Publish latest release
    if: github.event_name == 'push'
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Download release artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish latest release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: latest-release
          body: Automatically refreshed from the latest main build.
          files: release-assets/*
          make_latest: true
          overwrite_files: true

      - name: Create routine tag
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          LATEST_TAG=$(git tag --list 'v*' --sort=-v:refname | head -n 1)

          CURRENT_MAJOR=${CURRENT_VERSION%%.*}
          if [ -n "$LATEST_TAG" ]; then
            LATEST_VERSION=${LATEST_TAG#v}
            LATEST_MAJOR=${LATEST_VERSION%%.*}
            if [ "$CURRENT_MAJOR" -gt "$LATEST_MAJOR" ]; then
              echo "Manual major release detected; skipping automatic tag."
              exit 0
            fi
            BASE_VERSION=$LATEST_VERSION
          else
            BASE_VERSION=$CURRENT_VERSION
          fi

          BASE_MAJOR=$(printf '%s' "$BASE_VERSION" | cut -d. -f1)
          BASE_MINOR=$(printf '%s' "$BASE_VERSION" | cut -d. -f2)
          NEXT_VERSION="${BASE_MAJOR}.$((BASE_MINOR + 1)).0"
          NEXT_TAG="v${NEXT_VERSION}"

          if git rev-parse "$NEXT_TAG" >/dev/null 2>&1; then
            echo "Tag $NEXT_TAG already exists."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$NEXT_TAG"
          git push origin "$NEXT_TAG"
