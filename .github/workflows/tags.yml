name: Release Tags

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: release-tags
  cancel-in-progress: true

jobs:
  bump-tag:
    name: Bump routine release tag
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read current version
        id: version
        run: |
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          echo "current=$CURRENT_VERSION" >> "$GITHUB_OUTPUT"

      - name: Compute next minor version tag
        id: next
        run: |
          RESULT=$(node <<'NODE'
const fs = require('fs');
const { execSync } = require('child_process');

const current = JSON.parse(fs.readFileSync('package.json', 'utf8')).version;
const [currentMajor, currentMinor] = current.split('.').map(Number);
const latestTag = execSync("git tag --list 'v*' --sort=-v:refname | head -n 1", { encoding: 'utf8' }).trim();
const latestVersion = latestTag.startsWith('v') ? latestTag.slice(1) : '';
const latestMajor = latestVersion ? Number(latestVersion.split('.')[0]) : null;

if ((latestMajor !== null && currentMajor > latestMajor) || (latestMajor === null && currentMajor > 0)) {
  process.stdout.write('skip=true');
  process.exit(0);
}

process.stdout.write(`next=${currentMajor}.${currentMinor + 1}.0`);
NODE
          )

          if [ "$RESULT" = "skip=true" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "$RESULT" >> "$GITHUB_OUTPUT"

      - name: Create release tag if missing
        if: steps.next.outputs.skip != 'true'
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          NEXT_TAG="v${{ steps.next.outputs.next }}"
          if git rev-parse "$NEXT_TAG" >/dev/null 2>&1; then
            echo "Tag $NEXT_TAG already exists."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$NEXT_TAG"
          git push origin "$NEXT_TAG"
